<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAXI Home</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .logo {
            font-size: 48px;
            color: yellow;
            margin-top: 50px;
        }
        .role-selector {
            margin: 20px;
        }
        .role-button {
            background-color: yellow;
            color: black;
            border: none;
            padding: 15px 25px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px;
        }
        .role-button:hover {
            background-color: gold;
        }
    </style>
</head>
<body>
    <div class="logo">TAXI</div>
    <div class="role-selector">
        <button class="role-button">Client</button>
        <button class="role-button">Driver</button>
        <button class="role-button">Admin</button>
    </div>
</body>
</html>
